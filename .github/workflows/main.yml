name: Auto Send Email

on:
  schedule:
    # 你的当前时间是 20:02 (ACDT/UTC+10:30)
    # 对应 UTC 时间为 09:32
    # 我们设定在 UTC 09:35 触发（即你的 20:05），预留几分钟修改和排队时间
    - cron: '35 9 * * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Run script
      env:
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      run: python send_email.py
