name: Auto Send Email

on:
  schedule:
    # 阿德莱德当前处于夏令时 (ACDT)，时区为 UTC+10:30
    # 当地时间 20:20 对应 UTC 时间 09:50
    - cron: '50 9 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      # 必须有这一步，Python 脚本才能读取到仓库里的 email.txt
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Run script
      env:
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      run: python send_email.py
